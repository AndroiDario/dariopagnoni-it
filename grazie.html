<!doctype html>
<html lang="it">
  <head>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved
            ? saved
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {
          try {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
          } catch(e2) {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        }
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Messaggio inviato — Dario Pagnoni</title>
    <meta name="description" content="Conferma di invio del messaggio a Dario Pagnoni." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://dariopagnoni.it/grazie.html" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root,
      [data-theme="light"] {
        color-scheme: light;
        --bg: #fafaf8;
        --surface: #ffffff;
        --text: #1a1a1a;
        --text-secondary: #555;
        --line: rgba(0, 0, 0, 0.07);
        --sage: #7a9a6d;
        --sage-soft: rgba(122, 154, 109, 0.12);
        --shadow: 0 24px 48px rgba(0,0,0,0.06);
        --radius: 16px;
        --font: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --bg: #161616;
        --surface: #202020;
        --text: #e8e6e3;
        --text-secondary: #aaa;
        --line: rgba(255, 255, 255, 0.08);
        --sage: #a3b18a;
        --sage-soft: rgba(163, 177, 138, 0.14);
        --shadow: 0 24px 48px rgba(0,0,0,0.35);
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        font-family: var(--font);
        color: var(--text);
        background: var(--bg);
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        width: min(100%, 640px);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: clamp(32px, 7vw, 56px);
      }

      .label {
        margin: 0 0 14px;
        color: var(--sage);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.1rem, 8vw, 3.5rem);
        line-height: 1;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0 0 28px;
        color: var(--text-secondary);
        font-size: 1.02rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 12px 24px;
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
      }

      .btn-primary {
        background: var(--text);
        color: var(--bg);
      }

      .btn-ghost {
        border: 1px solid var(--line);
        color: var(--text-secondary);
      }

      .mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        border-radius: 14px;
        background: var(--sage-soft);
        color: var(--sage);
      }

      .mark svg {
        width: 22px;
        height: 22px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6 9 17l-5-5"></path>
        </svg>
      </div>
      <div class="label">Messaggio inviato</div>
      <h1>Grazie.</h1>
      <p>Ho ricevuto il tuo messaggio. Se serve una risposta, ti scriverò appena possibile.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Torna al sito</a>
        <a class="btn btn-ghost" href="https://www.linkedin.com/in/dariopagnoni/" target="_blank" rel="noreferrer">LinkedIn</a>
      </div>
    </main>
  </body>
</html>
