    <script>
      (function() {
        try {
          var saved = localStorage.getItem('theme');
          var theme = saved
            ? saved
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch(e) {
          try {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
          } catch(e2) {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        }
      })();
    </script>
    <!-- Consent Mode V2 defaults must run before Google Tag Manager -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      (function() {
        var cookieName = 'dp_cookie_consent=';
        var consentVersion = '2026-06-22-v1';
        var categories = { statistics: false, marketing: false };
        var parts = document.cookie ? document.cookie.split('; ') : [];

        for (var i = 0; i < parts.length; i += 1) {
          if (parts[i].indexOf(cookieName) === 0) {
            try {
              var saved = JSON.parse(decodeURIComponent(parts[i].slice(cookieName.length)));
              if (saved && saved.version === consentVersion && saved.categories) {
                categories.statistics = saved.categories.statistics === true;
                categories.marketing = saved.categories.marketing === true;
              }
            } catch(e) {}
            break;
          }
        }

        gtag('consent', 'default', {
          ad_storage: 'denied',
          ad_user_data: 'denied',
          ad_personalization: 'denied',
          analytics_storage: 'denied',
          wait_for_update: 500
        });
        gtag('set', 'ads_data_redaction', true);
        gtag('set', 'url_passthrough', false);

        if (categories.statistics || categories.marketing) {
          gtag('consent', 'update', {
            ad_storage: categories.marketing ? 'granted' : 'denied',
            ad_user_data: categories.marketing ? 'granted' : 'denied',
            ad_personalization: categories.marketing ? 'granted' : 'denied',
            analytics_storage: categories.statistics ? 'granted' : 'denied'
          });
          gtag('set', 'ads_data_redaction', categories.marketing !== true);
        }
      })();
    </script>

    <style>
      :root,
      [data-theme="light"] {
        color-scheme: light;
        --bg: #fafaf8;
        --surface: #ffffff;
        --text: #1a1a1a;
        --text-secondary: #555;
        --line: rgba(0, 0, 0, 0.07);
        --sage: #7a9a6d;
        --sage-soft: rgba(122, 154, 109, 0.12);
        --shadow: 0 24px 48px rgba(0,0,0,0.06);
        --radius: 16px;
        --font: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --bg: #161616;
        --surface: #202020;
        --text: #e8e6e3;
        --text-secondary: #aaa;
        --line: rgba(255, 255, 255, 0.08);
        --sage: #a3b18a;
        --sage-soft: rgba(163, 177, 138, 0.14);
        --shadow: 0 24px 48px rgba(0,0,0,0.35);
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        font-family: var(--font);
        color: var(--text);
        background: var(--bg);
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      main {
        width: min(100%, 640px);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: clamp(32px, 7vw, 56px);
      }

      .label {
        margin: 0 0 14px;
        color: var(--sage);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.1rem, 8vw, 3.5rem);
        line-height: 1;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0 0 28px;
        color: var(--text-secondary);
        font-size: 1.02rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 12px 24px;
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
      }

      .btn-primary {
        background: var(--text);
        color: var(--bg);
      }

      .btn-ghost {
        border: 1px solid var(--line);
        color: var(--text-secondary);
      }

      .mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        border-radius: 14px;
        background: var(--sage-soft);
        color: var(--sage);
      }

      .mark svg {
        width: 22px;
        height: 22px;
      }

      .legal-links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
        color: var(--text-secondary);
        font-size: 0.88rem;
      }

      .legal-links a {
        color: inherit;
      }
    </style>
  </head>

      </div>
      <div class="legal-links">

        <a href="/cookie-policy.html">Cookie Policy</a>
        <button class="dp-cmp-preferences" type="button" data-cmp-open>Preferenze cookie</button>
      </div>
    </main>
  </body>
